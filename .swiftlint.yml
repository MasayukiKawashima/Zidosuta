# SwiftLint設定ファイル - スタイル系ルールのみ

only_rules:
  # 空白・スペース関連
  - leading_whitespace
  - trailing_whitespace
  - return_arrow_whitespace
  - no_space_in_method_call
  - vertical_whitespace

  # 括弧・記号の配置
  - opening_brace
  - closing_brace
  - colon
  - comma

  # 改行・セミコロン
  - trailing_newline
  - trailing_semicolon

  # import文整理
  - duplicate_imports

  # コメント関連
  - comment_spacing

included:
  - Zidosuta
  - ZidosutaTests
  - ZidosutaUITests

excluded:
  - Pods
  - Carthage
  - .build
  - Generated
  - "*/.generated.swift"
  - DerivedData

vertical_whitespace:
  max_empty_lines: 1

reporter: xcode

