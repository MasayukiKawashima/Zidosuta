name: Zidosuta CD

on:
  push:
    branches:
      - release/**

jobs:
  cd:
    runs-on: macos-26
    env:
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}

      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_KEYCHAIN_NAME: ${{ secrets.MATCH_KEYCHAIN_NAME }}
      MATCH_KEYCHAIN_PASSWORD: ${{ secrets.MATCH_KEYCHAIN_PASSWORD }}

      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}

      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
      FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "6"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler: 2.7.2
          bundler-cache: true

      - name: Create and configure keychain
        run: |
          security create-keychain -p "$MATCH_KEYCHAIN_PASSWORD" "$MATCH_KEYCHAIN_NAME"
          security set-keychain-settings -lut 21600 "$MATCH_KEYCHAIN_NAME"
          security unlock-keychain -p "$MATCH_KEYCHAIN_PASSWORD" "$MATCH_KEYCHAIN_NAME"
          security list-keychains -d user -s "$MATCH_KEYCHAIN_NAME"
          security default-keychain -s "$MATCH_KEYCHAIN_NAME"

      - name: Run CD release
        run: bundle exec fastlane ios cd_release
        
