name: Zidosuta CI

on:
  push:
    branches:
      - feature/**

jobs:
  ci:
    runs-on: macos-26
    env:
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
      FASTLANE_XCODEBUILD_SETTINGS_RETRIES: "6"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"
          
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler: 2.7.2
          bundler-cache: true
          
      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: bundle exec fastlane ios ci_lint

      - name: Run CI tests
        run: bundle exec fastlane ios ci_test


