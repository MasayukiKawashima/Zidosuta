name: Zidosuta CI

on:
  push:
    branches:
      - feature/**

jobs:
  ci:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      # Xcode 16 を明示的に選択
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.2.2
          bundler: 2.7.2
          bundler-cache: true

      - name: Run CI tests
        run: bundle exec fastlane ios ci_test

